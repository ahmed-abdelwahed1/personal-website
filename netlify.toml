[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"


# Redirect for Netlify Identity
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

# Headers for security and SEO
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Link headers for agent discovery (RFC 8288 / RFC 9727)
[[headers]]
  for = "/"
  [headers.values]
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </.well-known/agent-skills/index.json>; rel="describedby", </sitemap.xml>; rel="service-desc"; type="application/xml"'''

[[headers]]
  for = "/index.html"
  [headers.values]
    Link = '''</.well-known/api-catalog>; rel="api-catalog", </.well-known/agent-skills/index.json>; rel="describedby", </sitemap.xml>; rel="service-desc"; type="application/xml"'''

# Content-Type for well-known endpoints
[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/mcp/server-card.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/openid-configuration"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/oauth-protected-resource"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/.well-known/agent-skills/index.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# Edge Function for Markdown content negotiation
[[edge_functions]]
  function = "markdown-negotiation"
  path = "/*"
