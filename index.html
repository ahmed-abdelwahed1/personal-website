    <script>
      // Netlify Identity sends password recovery/invite links to:
      //   https://site/#recovery_token=...
      // Decap CMS + netlify-identity-widget live under /admin/,
      // so we forward tokens there so the widget can handle them.
      (function () {
        var hash = window.location.hash || '';
        var hasIdentityToken =
          hash.indexOf('recovery_token=') !== -1 ||
          hash.indexOf('invite_token=') !== -1 ||
          hash.indexOf('confirmation_token=') !== -1;

        if (hasIdentityToken && window.location.pathname.indexOf('/admin') !== 0) {
          window.location.replace('/admin/' + hash);
        }
      })();
    </script>
