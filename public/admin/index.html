<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#090808" />
    <title>Content Manager — Ahmed Abdelwahed</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* ============================================
         Decap CMS — Custom Admin Theme
         Ahmed Abdelwahed Portfolio
         ============================================ */

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #090808;
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ---------- Loading Screen ---------- */

      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #090808;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #loading-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loading-icon {
        width: 48px;
        height: 48px;
        animation: loading-pulse 2s ease-in-out infinite;
      }

      .loading-label {
        margin-top: 24px;
        font-size: 13px;
        font-weight: 400;
        color: #555;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .loading-bar {
        margin-top: 28px;
        width: 100px;
        height: 2px;
        background: #1a1a1a;
        border-radius: 1px;
        overflow: hidden;
      }

      .loading-bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: #ffbc00;
        border-radius: 1px;
        animation: loading-slide 1.4s ease-in-out infinite;
      }

      @keyframes loading-pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }

      @keyframes loading-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(350%);
        }
      }

      /* ---------- Scrollbar ---------- */

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }

      /* ---------- Text Selection ---------- */

      ::selection {
        background: rgba(255, 188, 0, 0.25);
        color: inherit;
      }

      /* ---------- Decap CMS Overrides ---------- */

      #nc-root {
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <img class="loading-icon" src="/icon.svg" alt="" />
      <p class="loading-label">Content Manager</p>
      <div class="loading-bar"></div>
    </div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      (function () {
        var ls = document.getElementById("loading-screen");
        if (!ls) return;

        function dismiss() {
          ls.classList.add("fade-out");
          setTimeout(function () {
            if (ls.parentNode) ls.remove();
          }, 600);
        }

        var mo = new MutationObserver(function () {
          var r = document.getElementById("nc-root");
          if (r && r.children.length) {
            dismiss();
            mo.disconnect();
          }
        });
        mo.observe(document.body, { childList: true, subtree: true });

        setTimeout(function () {
          if (ls.parentNode) dismiss();
        }, 10000);
      })();

      CMS.registerPreviewStyle(
        "https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      );

      CMS.registerPreviewStyle(
        [
          "body {",
          "  font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;",
          "  color: #1a1a1a;",
          "  line-height: 1.8;",
          "  font-size: 15px;",
          "  font-weight: 300;",
          "  padding: 24px 32px;",
          "  max-width: 680px;",
          "  margin: 0 auto;",
          "  -webkit-font-smoothing: antialiased;",
          "  word-break: break-word;",
          "  overflow-wrap: break-word;",
          "}",
          "",
          "h1 { font-size: 24px; font-weight: 600; margin: 40px 0 14px; letter-spacing: -0.2px; }",
          "h2 { font-size: 20px; font-weight: 600; margin: 36px 0 12px; letter-spacing: -0.2px; }",
          "h3 { font-size: 17px; font-weight: 500; margin: 28px 0 10px; }",
          "h4 { font-size: 15px; font-weight: 500; margin: 24px 0 8px; }",
          "",
          "p { margin-bottom: 16px; }",
          "",
          "a {",
          "  color: #1a1a1a;",
          "  text-decoration: underline;",
          "  text-underline-offset: 3px;",
          "  text-decoration-color: #ccc;",
          "  text-decoration-thickness: 1px;",
          "}",
          "a:hover { text-decoration-color: #1a1a1a; }",
          "",
          "strong { font-weight: 500; }",
          "",
          "ul, ol { margin-bottom: 16px; padding-left: 20px; }",
          "ul { list-style: disc; }",
          "ol { list-style: decimal; }",
          "li { margin-bottom: 6px; padding-left: 4px; }",
          "li::marker { color: #666; }",
          "",
          "code {",
          "  background: #f5f5f5;",
          "  border: 1px solid #e0e0e0;",
          "  padding: 1px 6px;",
          "  border-radius: 4px;",
          "  font-size: 0.875em;",
          "  font-family: 'Fira Code', Consolas, monospace;",
          "}",
          "",
          "pre {",
          "  background: #f5f5f5;",
          "  border: 1px solid #e0e0e0;",
          "  border-radius: 6px;",
          "  padding: 18px 20px;",
          "  margin: 24px 0;",
          "  overflow-x: auto;",
          "}",
          "",
          "pre code {",
          "  background: none;",
          "  border: none;",
          "  padding: 0;",
          "  font-size: 13px;",
          "  line-height: 1.7;",
          "  white-space: pre;",
          "  display: block;",
          "}",
          "",
          "blockquote {",
          "  border-left: 2px solid #e0e0e0;",
          "  padding: 12px 16px;",
          "  margin: 24px 0;",
          "  font-style: italic;",
          "  color: #666;",
          "  background: #f8f9fa;",
          "  border-radius: 0 6px 6px 0;",
          "}",
          "blockquote p:last-child { margin-bottom: 0; }",
          "",
          "img {",
          "  max-width: 100%;",
          "  height: auto;",
          "  border-radius: 6px;",
          "  margin: 24px 0;",
          "}",
          "",
          "table {",
          "  width: 100%;",
          "  border-collapse: collapse;",
          "  font-size: 13px;",
          "  margin: 24px 0;",
          "}",
          "th, td { padding: 10px 14px; border: 1px solid #e0e0e0; text-align: left; }",
          "th { font-weight: 500; background: #f8f9fa; }",
          "",
          "hr { border: none; height: 1px; background: #e0e0e0; margin: 32px 0; }",
        ].join("\n"),
        { raw: true }
      );
    </script>
  </body>
</html>
