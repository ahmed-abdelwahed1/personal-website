backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://ahmedabdelwahed.me
display_url: https://ahmedabdelwahed.me
logo_url: https://ahmedabdelwahed.me/favicon.ico

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # ---- Hero / Site Info ----
  - name: "site"
    label: "Site Settings"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/site/hero.json"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Job Title", name: "title", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Open To (Tagline)", name: "openTo", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
          - { label: "GitHub URL", name: "github", widget: "string" }
          - { label: "X (Twitter) URL", name: "x", widget: "string" }
          - { label: "Medium URL", name: "medium", widget: "string" }
          - { label: "CV File Path", name: "cvFile", widget: "file", media_folder: "/public", public_folder: "/" }

  # ---- Experience ----
  - name: "experience"
    label: "Experience"
    label_singular: "Experience Entry"
    folder: "content/experience"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{fields.company}}"
    identifier_field: "company"
    summary: "{{fields.jobTitle}} at {{fields.company}}"
    sortable_fields: ["order", "company"]
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "Job Title", name: "jobTitle", widget: "string" }
      - { label: "Company", name: "company", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Date Range", name: "dateRange", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Company Logo", name: "logo", widget: "image", required: false, media_folder: "/public/images/logos", public_folder: "/images/logos" }

  # ---- Volunteering ----
  - name: "volunteering"
    label: "Volunteering"
    label_singular: "Volunteering Entry"
    folder: "content/volunteering"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{fields.organization}}"
    identifier_field: "organization"
    summary: "{{fields.role}} at {{fields.organization}}"
    sortable_fields: ["order", "organization"]
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Organization", name: "organization", widget: "string" }
      - { label: "Date Range", name: "dateRange", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Organization Logo", name: "logo", widget: "image", required: false, media_folder: "/public/images/logos", public_folder: "/images/logos" }

  # ---- Education ----
  - name: "education"
    label: "Education"
    label_singular: "Education Entry"
    folder: "content/education"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{fields.institution}}"
    identifier_field: "institution"
    summary: "{{fields.degree}} — {{fields.institution}}"
    sortable_fields: ["order", "institution"]
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "Degree / Program", name: "degree", widget: "string" }
      - { label: "Institution", name: "institution", widget: "string" }
      - { label: "Date Range", name: "dateRange", widget: "string" }

  # ---- Projects ----
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{fields.name}}"
    identifier_field: "name"
    summary: "{{fields.name}}"
    sortable_fields: ["order", "name"]
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "Project Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "GitHub URL", name: "githubUrl", widget: "string" }

  # ---- Badges / Certifications ----
  - name: "badges"
    label: "Badges & Certifications"
    label_singular: "Badge"
    folder: "content/badges"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{fields.name}}"
    identifier_field: "name"
    summary: "{{fields.name}}"
    sortable_fields: ["order", "name"]
    fields:
      - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
      - { label: "Badge Name", name: "name", widget: "string" }
      - { label: "Credential URL", name: "url", widget: "string" }

  # ---- Blog ----
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{fields.title}} — {{fields.date}}"
    sortable_fields: ["date", "title"]
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "A short summary shown on the blog listing and homepage." }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false, media_folder: "/public/images/uploads", public_folder: "/images/uploads" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - label: "Body"
        name: "body"
        widget: "markdown"
        editor_components:
          - "image"
          - "code-block"
        hint: "Write your blog post here. You can add headings, bold, italic, links, images, code blocks, lists, quotes, and more."
