backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

logo_url: "/admin/logo.svg"

collections:
  - name: "config"
    label: "Site Configuration"
    files:
      - name: "profile"
        label: "Profile Info"
        file: "src/content/profile.json"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Bio", name: "bio", widget: "text", hint: "Short professional summary."}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "LinkedIn", name: "linkedin", widget: "string"}
          - {label: "GitHub", name: "github", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string", required: false}
          - {label: "X (Twitter)", name: "x", widget: "string", required: false}
          - {label: "Medium", name: "medium", widget: "string", required: false}
          - {label: "Credly Profile", name: "credly", widget: "string", required: false}
          - label: "Credly Badge IDs"
            name: "credlyBadges"
            widget: "list"
            required: false
            hint: "Paste the badge UUID from Credly embed code."

      - name: "education"
        label: "Education (Source)"
        file: "src/content/education.json"
        fields:
          - label: "Education List"
            name: "education"
            widget: "list"
            collapsed: true
            summary: "{{fields.degree}} — {{fields.period}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Degree", name: "degree", widget: "string"}
              - {label: "Institution", name: "institution", widget: "string"}
              - {label: "Period", name: "period", widget: "string"}

      - name: "experience"
        label: "Experience (Load)"
        file: "src/content/experience.json"
        fields:
          - label: "Experience List"
            name: "experience"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}} — {{fields.organization}} ({{fields.period}})"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Organization", name: "organization", widget: "string"}
              - {label: "Period", name: "period", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Type", name: "type", widget: "select", options: ["work", "volunteer"]}

      - name: "skills"
        label: "Skills (Transform)"
        file: "src/content/skills.json"
        fields:
          - label: "Skill Categories"
            name: "skills"
            widget: "list"
            collapsed: true
            summary: "{{fields.category}}"
            fields:
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Items", name: "items", widget: "list"}

      - name: "certificates"
        label: "Certificates"
        file: "src/content/certificates.json"
        fields:
          - label: "Cert List"
            name: "certificates"
            widget: "list"
            collapsed: true
            summary: "{{fields.name}} — {{fields.issuer}}"
            fields:
              - {label: "ID", name: "id", widget: "string"}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Issuer", name: "issuer", widget: "string"}

      - name: "blog"
        label: "Blog Posts"
        file: "src/content/blog.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD"}
              - {label: "Slug", name: "slug", widget: "string", hint: "URL slug, e.g. my-first-post"}
              - {label: "Excerpt", name: "excerpt", widget: "text"}
              - {label: "Content", name: "content", widget: "markdown"}